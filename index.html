<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY SPACE</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:"Consolas","Microsoft YaHei";}

body{
background:#050510;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}


/* 粒子 */
#particles{position:fixed;width:100%;height:100%;z-index:-1;}

/* 卡片 */
.card{
width:420px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 60px rgba(0,255,255,0.2);
transition:0.3s;
}
.card:hover{transform:translateY(-5px);}

/* 标题 */
.title{
font-size:32px;
text-align:center;
margin-bottom:15px;
background:linear-gradient(90deg,#00f2ff,#ff00ea);
-webkit-background-clip:text;
color:transparent;
animation:glitch 2s infinite;
}
@keyframes glitch{
0%,100%{text-shadow:2px 2px #00f2ff;}
50%{text-shadow:-2px -2px #ff00ea;}
}

/* 终端 */
.terminal{
background:#000;
padding:15px;
border-radius:10px;
margin-bottom:20px;
font-size:14px;
color:#00ff9c;
height:90px;
overflow:hidden;
}

/* 按钮 */
.links a{
display:block;
text-align:center;
padding:12px;
margin:10px 0;
border-radius:10px;
text-decoration:none;
color:white;
background:linear-gradient(45deg,#00f2ff,#ff00ea);
transition:0.3s;
}
.links a:hover{
transform:scale(1.08);
box-shadow:0 0 20px #00f2ff;
}

/* 音乐按钮 */
.music-btn{
position:fixed;
right:20px;
bottom:20px;
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(45deg,#00f2ff,#ff00ea);
display:flex;
justify-content:center;
align-items:center;
color:white;
cursor:pointer;
opacity:0;
transition:0.5s;
}
.music-btn.show{opacity:1;}
.music-btn:hover{transform:scale(1.2);}

/* 鼠标光效 */
.cursor-glow{
position:fixed;
width:20px;height:20px;
background:#00f2ff;
border-radius:50%;
pointer-events:none;
filter:blur(10px);
}

.footer{text-align:center;margin-top:10px;font-size:12px;opacity:0.6;}

/* ===== 📱 移动端优化 ===== */
@media (max-width: 768px){

.card{
width:90%;
padding:20px;
}

.title{
font-size:24px;
}

.terminal{
font-size:12px;
height:80px;
}

.links a{
padding:10px;
font-size:14px;
}

.music-btn{
width:45px;
height:45px;
font-size:18px;
}

}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="card">
<div class="title">MY SPACE</div>
<div class="terminal" id="terminal"></div>

<div class="links">
<a href="https://github.com/你的用户名">🐙 GitHub</a>
<a href="guestbook.html">💬 树洞</a>
<a href="#">🌐 网站</a>
</div>

<div class="footer">© 2026</div>
</div>

<!-- 音乐 -->
<audio id="bgm" loop>
<source src="1.mp3" type="audio/mp3">
</audio>

<div class="music-btn" id="musicBtn">🎵</div>
<div class="cursor-glow" id="glow"></div>

<script>

/* 粒子（自适应性能） */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

/* 👉 手机减少粒子 */
let count = window.innerWidth < 768 ? 50 : 100;

let particles=[];
for(let i=0;i<count;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.vx;p.y+=p.vy;
if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#00f2ff";
ctx.fill();
});

/* 连线 */
for(let i=0;i<particles.length;i++){
for(let j=i+1;j<particles.length;j++){
let dx=particles[i].x-particles[j].x;
let dy=particles[i].y-particles[j].y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<100){
ctx.beginPath();
ctx.moveTo(particles[i].x,particles[i].y);
ctx.lineTo(particles[j].x,particles[j].y);
ctx.strokeStyle="rgba(0,255,255,0.1)";
ctx.stroke();
}
}
}

requestAnimationFrame(draw);
}
draw();

/* 打字 */
const text=[
"> 正在启动系统...",
"> 加载模块...",
"> 欢迎来到我的空间"
];

let l=0,c=0;
function type(){
if(l<text.length){
let t=text[l];
document.getElementById("terminal").innerHTML+=t.charAt(c);
c++;
if(c<t.length){
setTimeout(type,30);
}else{
terminal.innerHTML+="<br>";
l++;
c=0;
setTimeout(type,300);
}
}}
type();

/* 鼠标光效 */
const glow=document.getElementById("glow");
document.addEventListener("mousemove",e=>{
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

/* 音乐 */
const bgm=document.getElementById("bgm");
const btn=document.getElementById("musicBtn");

document.addEventListener("click",()=>{
btn.classList.add("show");
bgm.play().catch(()=>{});
},{once:true});

btn.onclick=()=>{
if(bgm.paused){
bgm.play();
btn.innerHTML="🔊";
}else{
bgm.pause();
btn.innerHTML="🎵";
}
};

</script>

</body>
</html>
